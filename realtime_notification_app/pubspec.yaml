name: notification_inbox_app
description: Firebase Notification Inbox System - Cloud Computing Assignment
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_database: ^11.2.0     # For Realtime Database
  shared_preferences: ^2.3.0     # To save username locally

  intl: ^0.19.0                  # For formatting timestamp
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true